{% extends 'user/userBase.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="flex justify-center items-center h-full">

<div class="bg-white p-10 rounded shadow-lg w-96">

<h2 class="text-2xl mb-6 text-center font-bold">User Register</h2>

<form action="/user/register" method="POST">

<div class="mb-4">
<label>Name</label>
<input type="text" name="name" class="border w-full p-2">
</div>

<div class="mb-4">
<label>Email</label>
<input type="email" name="email" class="border w-full p-2">
</div>

<div class="mb-4">
<label>Password</label>
<input type="password" name="password" class="border w-full p-2">
</div>

<button class="bg-blue-500 text-white w-full p-2 rounded">
Register
</button>

</form>

<a href="/user/login" class="text-blue-500 text-sm block text-center mt-4">
Already have account? Login
</a>

</div>

</div>

{% endblock %}
